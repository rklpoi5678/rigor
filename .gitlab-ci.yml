stages:
  - install
  - lint
  - build

variables:
  PNPM_STORE_PATH: .pnpm-store

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
      - .pnpm-store

install_dependencies:
  stage: install
  image: node:24-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm config set store-dir $PNPM_STORE_PATH
  script:
    - pnpm install --frozen-lockfile

lint_and_build:
  stage: build
  image: node:24-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
  script:
    - pnpm install --frozen-lockfile
    - pnpm run lint
    - pnpm run build